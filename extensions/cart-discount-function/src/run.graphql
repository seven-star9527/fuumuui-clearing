query RunInput {
  cart {
    metafield(namespace: "gwp_config", key: "settings") {
      value
    }
    lines {
      id
      quantity
      cost {
        amountPerQuantity {
          amount
        }
      }
      merchandise {
        ... on ProductVariant {
          product {
            hasAnyTag(tags: ["is_free_gift"])
            metafield(namespace: "custom", key: "_is_gift") {
              value
            }
          }
        }
      }
    }
  }
}
