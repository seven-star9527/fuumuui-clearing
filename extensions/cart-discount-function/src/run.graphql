query RunInput {
  cart {
    metafield(namespace: "gwp_config", key: "settings") {
      value
    }
    lines {
      id
      quantity
      cost {
        amountPerQuantity {
          amount
        }
      }
      merchandise {
        ... on ProductVariant {
          price {
            amount
          }
          product {
            tags
            metafields(identifiers: [{ namespace: "custom", key: "_is_gift" }]) {
              key
              value
            }
          }
        }
      }
    }
  }
}
